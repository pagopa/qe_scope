# criticality.yaml — peso degli endpoint per la copertura pesata (SCOPE)
#
# Risoluzione per precedenza (dalla più alta alla più bassa):
#   operation > path > spec > service > default
#
# Stato iniziale: nessuna regola -> tutti gli endpoint pesano "standard" (1.0)
# -> la copertura pesata COINCIDE con quella semplice (verifica dell'impianto).
#
# I pesi si possono calibrare anche dal dashboard (modifica live + "Esporta
# criticality.yaml"): il file scaricato va salvato qui al posto di questo.

classes:
  core: 3.0        # endpoint business-critical
  standard: 1.0    # default
  marginal: 0.3    # endpoint accessori / deprecati

default: standard

rules: []
# Esempi di regole (decommentare e adattare):
# rules:
#   - service: pn-delivery            # tutto il microservizio
#     class: core
#   - spec: api-external-b2b-pa       # tutta una spec
#     class: core
#   - path: "/delivery/requests*"     # glob sul path
#     class: core
#   - operation: getLegalFactById     # singolo endpoint (massima precedenza)
#     class: marginal
